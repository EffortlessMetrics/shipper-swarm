# ripr suppression ledger.
#
# Receipts for ripr findings that are intentionally left unexposed at the
# unit-test layer, typically because the change is covered by BDD or
# integration tests that ripr cannot see statically. Each suppression is
# a `[[suppression]]` table; the file starts empty and grows by PR.
#
# See docs/ci/ripr.md ("Suppression Format") for the field contract.
# This ledger is never required to be non-empty.

schema_version = "1.0"
policy = "ripr-suppressions"
owner = "EffortlessMetrics"
status = "active"

