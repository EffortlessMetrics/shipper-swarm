# Generated file allowlist.
#
# Receipts for machine-generated files that are tracked in git. Generated
# files must not be edited by hand; the receipt records what produces them
# and how to regenerate.
#
# See: docs/FILE_POLICY.md.

schema_version = "1.0"
policy = "generated-allowlist"
owner = "EffortlessMetrics"
status = "active"

[[glob]]
pattern = "**/*.snap"
kind = "insta_snapshot"
surface = "tests"
classification = "generated"
owner = "tests/snapshots"
generator = "insta"
regen_command = "cargo insta accept"
reason = "Insta snapshot files for snapshot-based test assertions. Regenerated by insta; never hand-edited."
covered_by = ["cargo test --workspace", "cargo insta review"]
created = "2026-05-11"
review_after = "2026-11-11"

[[file]]
path = "policy/no-panic-baseline.json"
kind = "no_panic_baseline"
surface = "policy"
classification = "generated"
owner = "rust/no-panic"
generator = "cargo xtask no-panic baseline"
regen_command = "cargo xtask no-panic baseline"
reason = "Machine-generated snapshot of every production panic-family call site (#187). Marked `linguist-generated=true` in .gitattributes; regenerated by xtask, never hand-edited."
covered_by = ["cargo xtask no-panic check --mode blocking"]
created = "2026-05-12"
review_after = "2026-11-12"

[[glob]]
pattern = "badges/*.json"
kind = "shields_badge_endpoint"
surface = "docs"
classification = "generated"
owner = "rust/tests"
generator = "cargo xtask repo-ripr-badge-artifacts"
regen_command = "cargo xtask repo-ripr-badge-artifacts"
reason = "Shields-compatible endpoint JSON for the public ripr README badges (#182 PR 2). Repo-scoped count of unresolved seam-native exposure gaps under the configured [severity.seams] policy. Marked `linguist-generated=true` in .gitattributes; refresh cadence is manual."
covered_by = ["manual review"]
created = "2026-05-12"
review_after = "2026-11-12"
