# Generated file allowlist.
#
# Receipts for machine-generated files that are tracked in git. Generated
# files must not be edited by hand; the receipt records what produces them
# and how to regenerate.
#
# See: docs/FILE_POLICY.md.

schema_version = "1.0"
policy = "generated-allowlist"
owner = "EffortlessMetrics"
status = "active"

[[glob]]
pattern = "**/*.snap"
kind = "insta_snapshot"
surface = "tests"
classification = "generated"
owner = "tests/snapshots"
generator = "insta"
regen_command = "cargo insta accept"
reason = "Insta snapshot files for snapshot-based test assertions. Regenerated by insta; never hand-edited."
covered_by = ["cargo test --workspace", "cargo insta review"]
created = "2026-05-11"
review_after = "2026-11-11"
