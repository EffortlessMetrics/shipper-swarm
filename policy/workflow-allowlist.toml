# Workflow allowlist.
#
# Every `.github/workflows/*.yml` file must appear here explicitly. No
# `.github/**` wildcard. Each workflow declares the process and network
# policies it operates under (see policy/process-allowlist.toml and
# policy/network-allowlist.toml).

schema_version = "1.0"
policy = "workflow-allowlist"
owner = "EffortlessMetrics"
status = "active"

# ─── CI workflows ───────────────────────────────────────────────────────────

[[workflow]]
path = ".github/workflows/ci.yml"
kind = "ci"
owner = "release/ci"
reason = "Broad full-CI workflow for pushes to main, manual dispatch, and weekly scheduled evidence: fmt, clippy, build matrix, nextest matrix, MSRV check, security audit, docs, BDD, fuzz smoke, heavy crypto proptests, and push/dispatch release build. Not the default PR gate in shipper-swarm."
process_policy = "ci"
network_policy = "ci"
created = "2026-05-11"
review_after = "2026-08-11"

[[workflow]]
path = ".github/workflows/coverage.yml"
kind = "ci"
owner = "release/ci"
reason = "Code coverage via cargo-llvm-cov uploaded to Codecov. Runs on main and PRs."
process_policy = "ci"
network_policy = "ci"
created = "2026-05-11"
review_after = "2026-08-11"

[[workflow]]
path = ".github/workflows/architecture-guard.yml"
kind = "ci"
owner = "rust/architecture"
reason = "Enforces the plan/state/runtime/ops/engine layering rules documented in crate CLAUDE.md files."
process_policy = "ci"
network_policy = "ci"
created = "2026-05-11"
review_after = "2026-08-11"

[[workflow]]
path = ".github/workflows/fuzz.yml"
kind = "ci_scheduled"
owner = "fuzz/tests"
reason = "Scheduled cargo-fuzz runs using nightly toolchain. Out of the default PR critical path."
process_policy = "ci"
network_policy = "ci"
created = "2026-05-11"
review_after = "2026-08-11"

[[workflow]]
path = ".github/workflows/mutation.yml"
kind = "ci_scheduled"
owner = "rust/tests"
reason = "Scheduled cargo-mutants runs for targeted mutation testing of trust-critical crates."
process_policy = "ci"
network_policy = "ci"
created = "2026-05-11"
review_after = "2026-08-11"

[[workflow]]
path = ".github/workflows/ripr.yml"
kind = "ci_advisory"
owner = "rust/tests"
reason = "Advisory PR lane: external EffortlessMetrics/ripr CLI for static mutation-exposure analysis. Never required; continue-on-error. See #182 and docs/ci/ripr.md."
process_policy = "ci"
network_policy = "ci"
created = "2026-05-12"
review_after = "2026-08-12"

[[workflow]]
path = ".github/workflows/live-runner-interruption-rehearsal.yml"
kind = "release_rehearsal"
owner = "release/ci"
reason = "Dedicated live-runner interruption proof: creates an interrupted .shipper artifact in one GitHub job, downloads it in a second job, resumes with fake Cargo and a mock registry, and uploads the resumed evidence packet."
process_policy = "ci"
network_policy = "ci"
created = "2026-05-18"
review_after = "2026-08-18"

[[workflow]]
path = ".github/workflows/em-ci-routed-rust.yml"
kind = "required_ci"
owner = "release/ci"
reason = "shipper-swarm required PR gate. Routes trusted same-repo work across CPX42, CX43, then CX53; fork/untrusted PRs and explicit operator-approved fallback use the GitHub-hosted tiny lane. Branch protection requires only the normalized Shipper Rust Small Result job."
process_policy = "ci"
network_policy = "ci"
created = "2026-05-20"
review_after = "2026-08-20"

# ─── Release workflow (high risk: secrets, Trusted Publishing, registry) ────

[[workflow]]
path = ".github/workflows/release.yml"
kind = "release"
owner = "release/ci"
reason = "Primary release workflow. Dogfoods shipper itself: cargo build, shipper plan/preflight/publish/resume, auth-evidence recording, Trusted Publishing attempt via OIDC with configured fallback secret until default proof exists, binary artifact build + upload, gh release create. Jobs are repository-guarded so the synced workflow is inert in EffortlessMetrics/shipper-swarm; release authority remains EffortlessMetrics/shipper."
process_policy = "release"
network_policy = "release"
required_repository_guard = "EffortlessMetrics/shipper"
created = "2026-05-11"
review_after = "2026-08-11"

# ─── Droid workflows (BYOK MiniMax, external Factory CLI fetch) ─────────────

[[workflow]]
