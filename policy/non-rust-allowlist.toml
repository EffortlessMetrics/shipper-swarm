# Non-Rust file allowlist.
#
# Every tracked non-Rust file should appear here (or in one of the more
# specific companion allowlists: generated, executable, dependency-surface,
# workflow). A receipt is "known surface, owner, reason, current disposition" —
# never "approved forever".
#
# `reason = "Scheduled to be converted to Rust/xtask"` is acceptable for
# legacy/migration entries, paired with an `expires` date.
#
# See: docs/FILE_POLICY.md and docs/policy/NON_RUST_ROLLOUT.md.

schema_version = "1.0"
policy = "non-rust-allowlist"
owner = "EffortlessMetrics"
status = "active"

