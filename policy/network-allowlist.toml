# Network policy allowlist.
#
# Named profiles enumerate which external endpoints are permitted under that
# policy. Workflows in policy/workflow-allowlist.toml reference one of these
# profiles via `network_policy = "..."`.
#
# Entries are honest first-pass receipts based on what each workflow profile
# actually contacts today. PR 8 (#207) adds the checker that scans workflows
# for endpoint references and reconciles against these profiles.

schema_version = "1.0"
policy = "network-allowlist"
owner = "EffortlessMetrics"
status = "active"

# ─── ci ─────────────────────────────────────────────────────────────────────

[[profile]]
name = "ci"
allowed_endpoints = [
  "github.com",
  "api.github.com",
  "raw.githubusercontent.com",
  "objects.githubusercontent.com",
  "ghcr.io",
  "crates.io",
  "static.crates.io",
  "index.crates.io",
  "static.rust-lang.org",
  "win.rustup.rs",
  "sh.rustup.rs",
  "codecov.io",
  "app.codecov.io",
  "cli.codecov.io",
]
owner = "release/ci"
reason = "CI fetches actions, toolchains (rustup), crates (crates.io + sparse index), and uploads coverage reports to Codecov. dtolnay/rust-toolchain and taiki-e/install-action add the rustup and ghcr endpoints."
created = "2026-05-11"
review_after = "2026-08-11"

# ─── release ────────────────────────────────────────────────────────────────

[[profile]]
name = "release"
allowed_endpoints = [
  "github.com",
  "api.github.com",
  "uploads.github.com",
  "objects.githubusercontent.com",
  "token.actions.githubusercontent.com",
  "crates.io",
  "static.crates.io",
  "index.crates.io",
  "static.rust-lang.org",
  "sh.rustup.rs",
  "win.rustup.rs",
]
owner = "release/ci"
reason = "Release workflow contacts token.actions.githubusercontent.com for the Trusted Publishing OIDC attempt, crates.io / index.crates.io / static.crates.io for publish and visibility verification, GitHub for artifact uploads and release creation, and the standard rustup/toolchain endpoints. Trusted Publishing default remains unpromoted until release evidence proves the short-lived-token path."
created = "2026-05-11"
review_after = "2026-08-11"

# ─── droid ──────────────────────────────────────────────────────────────────

[[profile]]
name = "droid"
allowed_endpoints = [
  "github.com",
  "api.github.com",
  "raw.githubusercontent.com",
  "objects.githubusercontent.com",
  "token.actions.githubusercontent.com",
  "app.factory.ai",
  "api.factory.ai",
  "api.minimax.io",
]
owner = "release/ci"
reason = "Droid workflows fetch the Factory CLI from app.factory.ai/cli, exchange the GitHub OIDC token for a Factory app token (token.actions.githubusercontent.com -> api.factory.ai), and route MiniMax-M2.7 BYOK requests to api.minimax.io/anthropic. The actions/checkout + droid-action-safe action also need GitHub endpoints."
created = "2026-05-11"
review_after = "2026-08-11"
