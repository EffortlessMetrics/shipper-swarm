stages:
  - publish

publish:
  image: rust:latest
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .shipper/
      - target/
  script:
    - cargo install shipper --locked
    - shipper publish --quiet
  variables:
    # Configure this in GitLab CI/CD settings (masked, protected)
    # CARGO_REGISTRY_TOKEN: "..."
    CARGO_TERM_COLOR: "always"
  artifacts:
    paths:
      - .shipper/
    expire_in: 1 day
    when: always
