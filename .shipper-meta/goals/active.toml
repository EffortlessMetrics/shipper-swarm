id = "shipper-swarm-development-control-plane"
title = "shipper-swarm development control plane"
status = "active"
owner = "EffortlessMetrics"
created = "2026-05-24"

objective = """
Keep EffortlessMetrics/shipper-swarm operating as Shipper's active development
control plane: drain and repair the PR queue, preserve release-authority
boundaries, verify post-merge evidence, and choose the next aligned improvement
from repo-local source-of-truth artifacts when the queue is empty.
"""

end_state = [
  "Open swarm PRs are inspected, repaired, validated, merged by squash when clean, or explicitly deferred.",
  "Post-merge main evidence is checked after each merge before starting unrelated work.",
  "EffortlessMetrics/shipper remains the release authority and receives swarm work only through non-squash merge commits.",
  "No release credentials, signing secrets, or crates.io publish tokens are moved into shipper-swarm.",
  "Support tiers, operation docs, and active goals do not claim more than the current proof supports.",
]

[[work_item]]
id = "swarm-queue-stewardship"
status = "active"
proposal = "docs/proposals/SHIPPER-PROP-0001-source-of-truth-and-release-evidence.md"
spec = "docs/specs/SHIPPER-SPEC-0001-source-of-truth-stack.md"
plan = "plans/swarm/development-control-plane.md"
issue = ""
commands = [
  "gh pr list --repo EffortlessMetrics/shipper-swarm --state open --json number,title,isDraft,mergeStateStatus,headRefName,updatedAt",
  "gh run list --repo EffortlessMetrics/shipper-swarm --limit 15 --json databaseId,status,conclusion,workflowName,event,headBranch,headSha,createdAt,updatedAt",
  "git merge-base --is-ancestor public/main origin/main",
  "git rev-list --left-right --count public/main...origin/main",
]

[[work_item]]
id = "swarm-source-of-truth-hygiene"
status = "ready"
