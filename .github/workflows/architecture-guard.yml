name: architecture-guard

on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/shipper-core/src/**'
      - 'crates/shipper/src/**'
  push:
    branches: [main]
    paths:
      - 'crates/shipper-core/src/**'
      - 'crates/shipper/src/**'

jobs:
  layer-imports:
    name: forbid upward layer imports
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7.0.0

      # Architecture rules per docs/decrating-plan.md §4.2 R3:
      # - engine -> may import plan, state, runtime, ops
      # - plan   -> may import state, runtime, ops
      # - state  -> may import runtime, ops
      # - runtime-> may import ops
      # - ops    -> may import nothing from above
      #
      # Layers live in `crates/shipper-core/src/` after the #95 split.
      - name: check ops/ does not import upward
        run: |
          set -e
          if [ ! -d crates/shipper-core/src/ops ]; then
            echo "ops/ layer not yet scaffolded — skipping."
            exit 0
          fi
          if grep -rE --include='*.rs' 'use crate::(engine|plan|state|runtime)::' crates/shipper-core/src/ops/; then
            echo "::error::ops/ layer must not import from engine, plan, state, or runtime"
            exit 1
          fi

      - name: check runtime/ does not import upward
        run: |
          set -e
          if [ ! -d crates/shipper-core/src/runtime ]; then
            echo "runtime/ layer not yet scaffolded — skipping."
            exit 0
          fi
          if grep -rE --include='*.rs' 'use crate::(engine|plan|state)::' crates/shipper-core/src/runtime/; then
            echo "::error::runtime/ layer must not import from engine, plan, or state"
            exit 1
          fi

      - name: check state/ does not import upward
        run: |
          set -e
          if [ ! -d crates/shipper-core/src/state ]; then
            echo "state/ layer not yet scaffolded — skipping."
            exit 0
          fi
          if grep -rE --include='*.rs' 'use crate::(engine|plan)::' crates/shipper-core/src/state/; then
            echo "::error::state/ layer must not import from engine or plan"
            exit 1
          fi

      - name: check plan/ does not import upward
        run: |
          set -e
          if [ ! -d crates/shipper-core/src/plan ]; then
            echo "plan/ layer not yet scaffolded — skipping."
            exit 0
          fi
          if grep -rE --include='*.rs' 'use crate::engine::' crates/shipper-core/src/plan/; then
            echo "::error::plan/ layer must not import from engine"
            exit 1
          fi
