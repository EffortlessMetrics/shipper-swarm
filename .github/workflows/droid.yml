name: Droid Tag

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, edited]

jobs:
  droid:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@droid') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@droid') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@droid') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
      ) ||
      (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@droid') || contains(github.event.issue.title, '@droid')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
      ) ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (contains(github.event.pull_request.body, '@droid') || contains(github.event.pull_request.title, '@droid')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
      )

    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx53, rust-large, trusted-pr]

    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Provide constrained gh shim for Droid PR checkout
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          cat > "$RUNNER_TEMP/bin/gh" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          if [[ "${1:-}" != "pr" || "${2:-}" != "checkout" ]]; then
            echo "This constrained gh shim only supports: gh pr checkout <number>" >&2
            exit 127
          fi

          pr_number="${3:-}"
          if [[ -z "$pr_number" || "$pr_number" == *[!0-9]* ]]; then
            echo "PR number must be numeric" >&2
            exit 2
          fi

          git fetch --no-tags --prune --depth=1 origin \
            "+refs/pull/${pr_number}/head:refs/remotes/droid-pr-${pr_number}"
          git checkout --force "refs/remotes/droid-pr-${pr_number}"
          SH
          chmod +x "$RUNNER_TEMP/bin/gh"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Configure MiniMax M3 for Factory Droid BYOK
        shell: bash
        run: |
          mkdir -p "$HOME/.factory"
          rm -f "$HOME/.factory/settings.local.json"
          cat > "$HOME/.factory/settings.json" <<'JSON'
          {
            "customModels": [
              {
                "displayName": "MiniMax-M3",
                "model": "MiniMax-M3",
                "baseUrl": "https://api.minimax.io/anthropic",
                "apiKey": "${MINIMAX_API_KEY}",
                "provider": "anthropic",
                "maxOutputTokens": 64000
              }
            ]
          }
          JSON

      - name: Install Bun for Droid action
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.11

      - name: Run Droid Exec with MiniMax M3 BYOK
        uses: EffortlessMetrics/droid-action-safe@7c1377ccbacddc95560d1570547a5baa51de01ec
        env:
          ANTHROPIC_AUTH_TOKEN: ""
          ANTHROPIC_BASE_URL: ""
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          upload_debug_artifacts: false
          path_to_bun_executable: ${{ steps.setup-bun.outputs.bun-path }}

          review_depth: shallow
          review_model: "custom:MiniMax-M3-0"
          security_model: "custom:MiniMax-M3-0"
          show_full_output: false
