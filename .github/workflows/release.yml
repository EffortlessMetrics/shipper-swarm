# Release workflow for shipper
#
# Dogfoods Shipper itself: the crates.io publish train is driven by
# `shipper plan` -> `shipper preflight` -> `shipper publish`, with
# `shipper resume` available for recovery. The binary-artifact + GitHub
# Release steps are only finalized AFTER crates.io publishes succeed.
#
# Triggers:
#   - push of a `v*.*.*` tag  -> full release (build + publish + release)
#   - workflow_dispatch "rehearse" -> plan + preflight dry-run only
#   - workflow_dispatch "resume"   -> download .shipper/ artifact and resume
#
# Repository guard:
#   This workflow is synced into EffortlessMetrics/shipper-swarm for history
#   continuity, but release authority stays in EffortlessMetrics/shipper. Every
#   job below checks github.repository so tag/dispatch runs in shipper-swarm
#   are inert and cannot publish or create GitHub releases from the dev repo.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Release mode'
        required: true
        default: 'rehearse'
        type: choice
        options:
          - rehearse
          - resume
      ref:
        description: 'Git ref to check out (tag/branch/SHA). Defaults to the workflow ref.'
        required: false
        default: ''
      artifact_run_id:
        description: 'For resume mode: workflow run ID to download the .shipper artifact from.'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  # OIDC for Trusted Publishing (crates-io-auth-action). Needed by publish /
  # rehearse / resume jobs; read-only reach is fine for the others. See #96.
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Build per-platform release binaries. These are published as GitHub Release
  # assets AFTER crates.io publish succeeds. (On tag pushes only.)
  # ---------------------------------------------------------------------------
  build-binaries:
    name: Build ${{ matrix.target }}
    if: github.repository == 'EffortlessMetrics/shipper' && github.event_name == 'push'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p shipper

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../shipper-${{ matrix.target }}.tar.gz shipper
          cd -

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../shipper-${{ matrix.target }}.zip shipper.exe
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: shipper-${{ matrix.target }}
          path: shipper-${{ matrix.target }}.*
          retention-days: 7

  # ---------------------------------------------------------------------------
  # MSRV sanity check gates the publish train. The published crates declare
  # rust-version = 1.95; the publish job should not run if MSRV is broken.
  # ---------------------------------------------------------------------------
  msrv-gate:
    name: MSRV gate (1.95)
    if: github.repository == 'EffortlessMetrics/shipper' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-msrv-
      - name: Check with MSRV
        run: cargo check --workspace

  # ---------------------------------------------------------------------------
  # Policy gate. Enforces release-time policy invariants that PR-time CI also
  # checks, but pinned to the publish train so a tag push cannot publish if
  # the baselines have drifted (e.g., new panic-family debt landed without a
  # baseline regen). Lives here in addition to PR-time CI because the tag
  # might be cut from an older SHA where the PR-time gate had different
  # contents.
  # ---------------------------------------------------------------------------
  policy-gate:
    name: Policy gate (no-panic + invariants)
    if: github.repository == 'EffortlessMetrics/shipper' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-policy-gate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-policy-gate-
      - name: cargo xtask no-panic check (blocking)
        run: cargo xtask no-panic check --mode blocking
      - name: cargo xtask check-lint-policy
        run: cargo xtask check-lint-policy
      - name: Upload no-panic report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-policy-gate
          path: target/policy/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # The dogfood publish train.
  #
  # Execution order:
  #   1.  Install shipper from the supported facade crate and verify it.
  #   2.  `shipper plan`  — persist plan to .shipper/, also dump JSON to
  #       .shipper/plan.json for artifact review.
  #   3.  Upload .shipper/ as an artifact BEFORE preflight runs (belt-and-
  #       braces: even if the runner dies mid-preflight the plan is preserved).
  #   4.  `shipper preflight` — git-clean check, registry reachability,
  #       version-not-taken check, workspace dry-run build.
  #   5.  `shipper publish` — the real train. Shipper's engine handles retry
  #       with exponential backoff on HTTP 429, post-publish readiness
  #       verification via sparse-index or API before advancing, and
  #       .shipper/state.json persistence after every step.
  #   6.  Final post-publish verification: `cargo search` each published crate
  #       at the tag's version to confirm registry visibility from a fresh
  #       resolver.
  #   7.  Upload the final .shipper/ state as an artifact regardless of outcome.
  #
  # Registry pacing:
  #   Shipper uses its registry profile first, honors Retry-After floors when
  #   Cargo surfaces them, and only then falls back to exponential retry.
  #   First-publish pacing and existing-version pacing can differ; the
  #   preflight step reports the estimated minimum registry wait for this
  #   workspace before the publish train starts.
  #
  #   `shipper publish` handles pacing natively:
  #     - --policy safe enables post-publish readiness verification before the
  #       next crate starts, so rate-limit 429s surface as retryable backoff
  #       rather than cascade failures.
  #     - --max-attempts 12 + --max-delay 15m gives the retry loop enough
  #       budget to ride through crates.io pacing floors.
  #     - --verify-timeout 10m and --readiness-timeout 15m allow for sparse-
  #       index propagation.
  #   If the runner times out mid-train, trigger the `resume`
  #   workflow_dispatch with this run's ID to pick up from .shipper/state.json.
  # ---------------------------------------------------------------------------
  publish-crates-io:
    name: Publish to crates.io (via shipper)
    if: github.repository == 'EffortlessMetrics/shipper' && github.event_name == 'push'
    runs-on: self-hosted
    needs: [msrv-gate, policy-gate]
    environment: release
    timeout-minutes: 180
    outputs:
      publish_succeeded: ${{ steps.publish.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-publish-

      # --- Step 1: install shipper from the supported facade crate ---------
      - name: Install shipper facade crate
        run: |
          cargo install --path crates/shipper --locked --root "$RUNNER_TEMP/shipper-install"
          echo "$RUNNER_TEMP/shipper-install/bin" >> "$GITHUB_PATH"

      - name: Verify installed shipper
        run: |
          shipper --version

      # --- Step 2: plan -----------------------------------------------------
      - name: shipper plan
        run: |
          mkdir -p .shipper
          shipper plan \
            --registry crates-io \
            --state-dir .shipper \
            --format json \
            | tee .shipper/plan.txt

      # --- Step 3: upload plan artifact BEFORE anything destructive --------
      - name: Upload .shipper/ (plan stage)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shipper-state-plan
          path: .shipper/
          include-hidden-files: true
          retention-days: 30

      # --- Step 3b: mint a short-lived crates.io token via Trusted Publishing
      # Requires each published crate to be pre-registered as a trusted
      # publisher on crates.io with this repo + workflow + `release`
      # environment. See docs/how-to/run-in-github-actions.md.
      #
      # Falls back to the CARGO_REGISTRY_TOKEN secret if the action doesn't
      # run or outputs no token — kept as a safety rail for the very first
      # release after OIDC is wired up and during incident response.
      #
      # # Mixed-registration caveat (#96 review)
      #
      # If the OIDC action succeeds but only some of the crates in the
      # plan are registered as trusted publishers for this repo, the
      # minted token will 401 on the unregistered crates mid-train —
      # AFTER some publishes have already succeeded. The `preflight`
      # step below uses `--policy safe` which enables per-crate
      # ownership checks with this same token; any scope mismatch
      # surfaces there and the `Fail fast if preflight failed` gate
      # refuses to start the publish train. Operators enabling Trusted
      # Publishing for the first time MUST register all published
      # crates BEFORE their first live run — see
      # docs/how-to/run-in-github-actions.md for the one-time
      # registration checklist.
      - name: Mint crates.io token (Trusted Publishing)
        id: auth
        # continue-on-error: if the repo/crates aren't yet registered for
        # Trusted Publishing on crates.io, this action exits non-zero
        # ("No Trusted Publishing config found for repository ..."). The
        # downstream publish steps read
        # `steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN`, so
        # a failed OIDC exchange cleanly falls through to the secret
        # token. This is the safety rail called out above — don't fail
        # the whole release just because OIDC isn't configured yet.
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@v1

      - name: Record release auth evidence
        if: always()
        env:
          SHIPPER_RELEASE_AUTH_ACTION_OUTCOME: ${{ steps.auth.outcome }}
          SHIPPER_RELEASE_AUTH_TOKEN_MINTED: ${{ steps.auth.outputs.token != '' }}
          SHIPPER_RELEASE_AUTH_FALLBACK_CONFIGURED: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
          SHIPPER_RELEASE_AUTH_RUN_ID: ${{ github.run_id }}
          SHIPPER_RELEASE_AUTH_RUN_ATTEMPT: ${{ github.run_attempt }}
          SHIPPER_RELEASE_AUTH_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p .shipper
          token_minted="${SHIPPER_RELEASE_AUTH_TOKEN_MINTED:-false}"
          fallback_configured="${SHIPPER_RELEASE_AUTH_FALLBACK_CONFIGURED:-false}"
          fallback_used=false
          selected_token_source="missing"
          if [ "$token_minted" = "true" ]; then
            selected_token_source="trusted_publishing"
          elif [ "$fallback_configured" = "true" ]; then
            selected_token_source="fallback_secret"
            fallback_used=true
          fi
          printf '%s\n' \
            '{' \
            '  "schema_version": "shipper.release_auth_evidence.v1",' \
            '  "workflow": "Release",' \
            '  "job": "publish-crates-io",' \
            "  \"run_id\": \"${SHIPPER_RELEASE_AUTH_RUN_ID}\"," \
            "  \"run_attempt\": \"${SHIPPER_RELEASE_AUTH_RUN_ATTEMPT}\"," \
            "  \"commit\": \"${SHIPPER_RELEASE_AUTH_COMMIT}\"," \
            '  "environment": "release",' \
            '  "auth_action": {' \
            '    "name": "rust-lang/crates-io-auth-action@v1",' \
            "    \"outcome\": \"${SHIPPER_RELEASE_AUTH_ACTION_OUTCOME}\"," \
            "    \"token_minted\": ${token_minted}" \
            '  },' \
            '  "fallback": {' \
            "    \"configured\": ${fallback_configured}," \
            "    \"used\": ${fallback_used}" \
            '  },' \
            "  \"selected_token_source\": \"${selected_token_source}\"," \
            '  "limits": [' \
            '    "token values are intentionally omitted",' \
            '    "crates.io-side trusted-publisher registration is not proven by this artifact"' \
            '  ]' \
            '}' \
            > .shipper/auth-evidence.json

      # --- Step 4: preflight ------------------------------------------------
      # `--policy safe` enables ownership checks. For existing crates
      # those checks exercise the minted OIDC token against crates.io;
      # a scope mismatch surfaces here before any publish. New crates
      # have no owner record yet so the check is best-effort — hence
      # the one-time-registration operator checklist in the how-to.
      - name: shipper preflight
        id: preflight
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          shipper preflight \
            --registry crates-io \
            --state-dir .shipper \
            --policy safe

      - name: Upload .shipper/ (preflight stage)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shipper-state-preflight
          path: .shipper/
          include-hidden-files: true
          retention-days: 30

      - name: Fail fast if preflight failed
        if: steps.preflight.outcome != 'success'
        run: |
          echo "::error::shipper preflight failed — aborting before publish."
          echo "Download the shipper-state-preflight artifact for details."
          exit 1

      # --- Step 5: publish --------------------------------------------------
      # `shipper publish` is idempotent: if .shipper/state.json already has
      # published entries, it skips them and resumes. That means a re-run of
      # this job (or the dedicated `resume` job below) naturally picks up.
      - name: shipper publish
        id: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          shipper publish \
            --registry crates-io \
            --state-dir .shipper \
            --policy safe \
            --verify-mode package \
            --readiness-method both \
            --readiness-timeout 15m \
            --verify-timeout 10m \
            --max-attempts 12 \
            --base-delay 10s \
            --max-delay 15m \
            --retry-strategy exponential

      # --- Step 6: final verification --------------------------------------
      - name: Verify crates on crates.io
        if: steps.publish.outcome == 'success'
        run: |
          # Ask cargo to resolve each published crate from a fresh cache.
          set -euo pipefail
          CRATES=(
            shipper-duration
            shipper-retry
            shipper-encrypt
            shipper-output-sanitizer
            shipper-cargo-failure
            shipper-sparse-index
            shipper-webhook
            shipper-types
            shipper-registry
            shipper-config
            shipper-core
            shipper-cli
            shipper
          )
          for c in "${CRATES[@]}"; do
            echo "::group::cargo search $c"
            cargo search "$c" --limit 1
            echo "::endgroup::"
          done

      # --- Step 7: always persist final .shipper/ state --------------------
      - name: Upload .shipper/ (final state)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shipper-state-final
          path: .shipper/
          include-hidden-files: true
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Create the GitHub Release. ONLY runs after crates.io publish succeeds.
  # Attaches platform binaries + final .shipper/ state as evidence.
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    if: github.repository == 'EffortlessMetrics/shipper' && github.event_name == 'push'
    runs-on: self-hosted
    needs: [build-binaries, publish-crates-io]
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: shipper-*

      - name: Download final shipper state
        uses: actions/download-artifact@v8
        with:
          name: shipper-state-final
          path: artifacts/shipper-state-final

      - name: Bundle final shipper state
        run: |
          cd artifacts
          tar czvf shipper-release-state.tar.gz shipper-state-final
          rm -rf shipper-state-final

      - name: List release assets
        run: ls -la artifacts/ artifacts/*/ 2>/dev/null || true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/shipper-*.tar.gz
            artifacts/**/shipper-*.zip
            artifacts/shipper-release-state.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}

  # ---------------------------------------------------------------------------
  # Rehearsal: plan + preflight only. No publishing.
  #
  # Use this before cutting a tag. It surfaces missing metadata, dirty trees,
  # ownership issues, and missing registry tokens in a safe sandbox. Output
  # artifact is the .shipper/ directory showing exactly what would happen.
  # ---------------------------------------------------------------------------
  release-rehearse:
    name: Release rehearse (plan + preflight dry-run)
    if: github.repository == 'EffortlessMetrics/shipper' && github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'rehearse'
    runs-on: self-hosted
    # Bind to the `release` environment so the OIDC token minted here is
    # scoped identically to the production `publish-crates-io` job's.
    # Without this, rehearsal would validate only the mint *mechanism*
    # while silently passing a real scope-binding misconfiguration
    # (production job asks for a `release`-scoped token and gets denied,
    # but rehearsal never exercised the same scope). Matching scopes
    # here means rehearsal fails fast on the same scope errors prod
    # would hit. See #96 review discussion.
    environment: release
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-rehearse-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rehearse-

      - name: Install shipper facade crate
        run: |
          cargo install --path crates/shipper --locked --root "$RUNNER_TEMP/shipper-install"
          echo "$RUNNER_TEMP/shipper-install/bin" >> "$GITHUB_PATH"

      - name: Verify installed shipper
        run: |
          shipper --version

      - name: shipper plan (verbose)
        run: |
          mkdir -p .shipper
          shipper plan \
            --registry crates-io \
            --state-dir .shipper \
            --format json \
            --verbose \
            | tee .shipper/plan.txt

      # Mint a Trusted Publishing token for the deeper preflight (ownership
      # queries benefit from a real token). OIDC unavailable? Fall back to
      # the CARGO_REGISTRY_TOKEN secret — rehearse keeps working either way.
      - name: Mint crates.io token (Trusted Publishing)
        id: auth
        # continue-on-error: if the repo/crates aren't yet registered for
        # Trusted Publishing on crates.io, this action exits non-zero
        # ("No Trusted Publishing config found for repository ..."). The
        # downstream publish steps read
        # `steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN`, so
        # a failed OIDC exchange cleanly falls through to the secret
        # token. This is the safety rail called out above — don't fail
        # the whole release just because OIDC isn't configured yet.
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@v1

      - name: Record release auth evidence
        if: always()
        env:
          SHIPPER_RELEASE_AUTH_ACTION_OUTCOME: ${{ steps.auth.outcome }}
          SHIPPER_RELEASE_AUTH_TOKEN_MINTED: ${{ steps.auth.outputs.token != '' }}
          SHIPPER_RELEASE_AUTH_FALLBACK_CONFIGURED: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
          SHIPPER_RELEASE_AUTH_RUN_ID: ${{ github.run_id }}
          SHIPPER_RELEASE_AUTH_RUN_ATTEMPT: ${{ github.run_attempt }}
          SHIPPER_RELEASE_AUTH_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p .shipper
          token_minted="${SHIPPER_RELEASE_AUTH_TOKEN_MINTED:-false}"
          fallback_configured="${SHIPPER_RELEASE_AUTH_FALLBACK_CONFIGURED:-false}"
          fallback_used=false
          selected_token_source="missing"
          if [ "$token_minted" = "true" ]; then
            selected_token_source="trusted_publishing"
          elif [ "$fallback_configured" = "true" ]; then
            selected_token_source="fallback_secret"
            fallback_used=true
          fi
          printf '%s\n' \
            '{' \
            '  "schema_version": "shipper.release_auth_evidence.v1",' \
            '  "workflow": "Release",' \
            '  "job": "release-rehearse",' \
            "  \"run_id\": \"${SHIPPER_RELEASE_AUTH_RUN_ID}\"," \
            "  \"run_attempt\": \"${SHIPPER_RELEASE_AUTH_RUN_ATTEMPT}\"," \
            "  \"commit\": \"${SHIPPER_RELEASE_AUTH_COMMIT}\"," \
            '  "environment": "release",' \
            '  "auth_action": {' \
            '    "name": "rust-lang/crates-io-auth-action@v1",' \
            "    \"outcome\": \"${SHIPPER_RELEASE_AUTH_ACTION_OUTCOME}\"," \
            "    \"token_minted\": ${token_minted}" \
            '  },' \
            '  "fallback": {' \
            "    \"configured\": ${fallback_configured}," \
            "    \"used\": ${fallback_used}" \
            '  },' \
            "  \"selected_token_source\": \"${selected_token_source}\"," \
            '  "limits": [' \
            '    "token values are intentionally omitted",' \
            '    "crates.io-side trusted-publisher registration is not proven by this artifact"' \
            '  ]' \
            '}' \
            > .shipper/auth-evidence.json

      # Preflight against crates.io without publishing. A token isn't strictly
      # required here (ownership checks are best-effort), but supply it if the
      # `release` environment is available for a deeper check.
      - name: shipper preflight (dry-run)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          shipper preflight \
            --registry crates-io \
            --state-dir .shipper \
            --policy safe \
            --skip-ownership-check

      - name: Upload rehearsal state
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shipper-rehearse-${{ github.run_id }}
          path: .shipper/
          include-hidden-files: true
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Resume a previously-interrupted publish run.
  #
  # Inputs:
  #   mode            = "resume"
  #   artifact_run_id = the workflow run ID that uploaded shipper-state-final
  #                     or shipper-state-preflight from a failed attempt
  #   ref             = the exact tag/SHA that failed (MUST match the plan ID
  #                     in state.json or shipper will refuse to resume)
  #
  # The plan-ID check is intentional: if the workspace has changed between
  # runs, resume aborts. This is the guardrail that keeps partial publishes
  # from desyncing with the ledger.
  # ---------------------------------------------------------------------------
  release-resume:
    name: Release resume
    if: github.repository == 'EffortlessMetrics/shipper' && github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'resume'
    runs-on: self-hosted
    environment: release
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-publish-

      - name: Install shipper facade crate
        run: |
          cargo install --path crates/shipper --locked --root "$RUNNER_TEMP/shipper-install"
          echo "$RUNNER_TEMP/shipper-install/bin" >> "$GITHUB_PATH"

      - name: Verify installed shipper
        run: |
          shipper --version

      - name: Download prior .shipper/ state
        uses: actions/download-artifact@v8
        with:
          name: shipper-state-final
          path: .shipper/
          run-id: ${{ github.event.inputs.artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect recovered state
        run: |
          ls -la .shipper/
          [ -f .shipper/state.json ] || { echo "::error::.shipper/state.json missing from recovered artifact"; exit 1; }

      # Mint a fresh Trusted Publishing token for the resume (previous run's
      # token is already expired). Falls back to secret if OIDC unavailable.
      - name: Mint crates.io token (Trusted Publishing)
        id: auth
        # continue-on-error: if the repo/crates aren't yet registered for
        # Trusted Publishing on crates.io, this action exits non-zero
        # ("No Trusted Publishing config found for repository ..."). The
        # downstream publish steps read
        # `steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN`, so
        # a failed OIDC exchange cleanly falls through to the secret
        # token. This is the safety rail called out above — don't fail
        # the whole release just because OIDC isn't configured yet.
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@v1

      - name: Record release auth evidence
        if: always()
        env:
          SHIPPER_RELEASE_AUTH_ACTION_OUTCOME: ${{ steps.auth.outcome }}
          SHIPPER_RELEASE_AUTH_TOKEN_MINTED: ${{ steps.auth.outputs.token != '' }}
          SHIPPER_RELEASE_AUTH_FALLBACK_CONFIGURED: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
          SHIPPER_RELEASE_AUTH_RUN_ID: ${{ github.run_id }}
          SHIPPER_RELEASE_AUTH_RUN_ATTEMPT: ${{ github.run_attempt }}
          SHIPPER_RELEASE_AUTH_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p .shipper
          token_minted="${SHIPPER_RELEASE_AUTH_TOKEN_MINTED:-false}"
          fallback_configured="${SHIPPER_RELEASE_AUTH_FALLBACK_CONFIGURED:-false}"
          fallback_used=false
          selected_token_source="missing"
          if [ "$token_minted" = "true" ]; then
            selected_token_source="trusted_publishing"
          elif [ "$fallback_configured" = "true" ]; then
            selected_token_source="fallback_secret"
            fallback_used=true
          fi
          printf '%s\n' \
            '{' \
            '  "schema_version": "shipper.release_auth_evidence.v1",' \
            '  "workflow": "Release",' \
            '  "job": "release-resume",' \
            "  \"run_id\": \"${SHIPPER_RELEASE_AUTH_RUN_ID}\"," \
            "  \"run_attempt\": \"${SHIPPER_RELEASE_AUTH_RUN_ATTEMPT}\"," \
            "  \"commit\": \"${SHIPPER_RELEASE_AUTH_COMMIT}\"," \
            '  "environment": "release",' \
            '  "auth_action": {' \
            '    "name": "rust-lang/crates-io-auth-action@v1",' \
            "    \"outcome\": \"${SHIPPER_RELEASE_AUTH_ACTION_OUTCOME}\"," \
            "    \"token_minted\": ${token_minted}" \
            '  },' \
            '  "fallback": {' \
            "    \"configured\": ${fallback_configured}," \
            "    \"used\": ${fallback_used}" \
            '  },' \
            "  \"selected_token_source\": \"${selected_token_source}\"," \
            '  "limits": [' \
            '    "token values are intentionally omitted",' \
            '    "crates.io-side trusted-publisher registration is not proven by this artifact"' \
            '  ]' \
            '}' \
            > .shipper/auth-evidence.json

      - name: shipper resume
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          shipper resume \
            --registry crates-io \
            --state-dir .shipper \
            --policy safe \
            --verify-mode package \
            --readiness-method both \
            --readiness-timeout 15m \
            --verify-timeout 10m \
            --max-attempts 12 \
            --base-delay 10s \
            --max-delay 15m \
            --retry-strategy exponential

      - name: Upload .shipper/ (post-resume state)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shipper-state-resume-${{ github.run_id }}
          path: .shipper/
          include-hidden-files: true
          retention-days: 90
