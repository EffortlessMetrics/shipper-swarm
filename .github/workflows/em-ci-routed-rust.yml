name: Routed Rust Small

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      force_route:
        description: Force one route for proof runs.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - cx43
          - cx33
          - cx53
          - github

concurrency:
  group: routed-rust-small-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

permissions:
  contents: read

jobs:
  route:
    name: Route Shipper Rust Small
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.pick.outputs.target }}
      reason: ${{ steps.pick.outputs.reason }}
      trusted: ${{ steps.pick.outputs.trusted }}
    steps:
      - name: Pick route
        id: pick
        env:
          FORCE_ROUTE: ${{ github.event.inputs.force_route || 'auto' }}
          RUNNER_READ_TOKEN: ${{ secrets.EM_RUNNER_READ_TOKEN }}
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          event_name = os.environ["GITHUB_EVENT_NAME"]
          event_path = os.environ["GITHUB_EVENT_PATH"]
          force_route = os.environ.get("FORCE_ROUTE", "auto").strip().lower() or "auto"
          token = os.environ.get("RUNNER_READ_TOKEN", "")
          route_order = ["cx43", "cx33", "cx53"]

          with open(event_path, "r", encoding="utf-8") as fh:
              event = json.load(fh)

          trusted = event_name in {"push", "workflow_dispatch"}
          if event_name == "pull_request":
              head_repo = (
                  event.get("pull_request", {})
                  .get("head", {})
                  .get("repo", {})
                  .get("full_name")
              )
              trusted = head_repo == repo

          def set_output(target, reason):
              output_path = os.environ["GITHUB_OUTPUT"]
              with open(output_path, "a", encoding="utf-8") as out:
                  out.write(f"target={target}\n")
                  out.write(f"reason={reason}\n")
                  out.write(f"trusted={str(trusted).lower()}\n")
              print(f"repo={repo}")
              print("workflow=em-ci-routed-rust")
              print(f"run_id={os.environ['GITHUB_RUN_ID']}")
              print(f"router_target={target}")
              print(f"router_reason={reason}")
              print(f"trusted={str(trusted).lower()}")

          if not trusted:
              set_output("github", "untrusted_pr")
              sys.exit(0)

          if force_route == "github":
              set_output("github", "forced_github")
              sys.exit(0)

          if force_route in route_order:
              set_output(force_route, f"forced_{force_route}")
              sys.exit(0)

          if not token:
              set_output("github", "no_runner_read_token")
              sys.exit(0)

          request = urllib.request.Request(
              "https://api.github.com/orgs/EffortlessMetrics/actions/runners?per_page=100",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          try:
              with urllib.request.urlopen(request, timeout=10) as response:
                  payload = json.load(response)
          except (urllib.error.URLError, TimeoutError, OSError, json.JSONDecodeError) as exc:
              print(f"runner_api_error={exc}")
              set_output("github", "runner_api_failed")
              sys.exit(0)

          runners = payload.get("runners", [])
          common_labels = {"self-hosted", "linux", "x64", "em-ci", "rust-small", "trusted-pr"}
          for target in route_order:
              required = common_labels | {target}
              for runner in runners:
                  labels = {
                      str(label.get("name", "")).lower()
                      for label in runner.get("labels", [])
                  }
                  if (
                      runner.get("status") == "online"
                      and not runner.get("busy", False)
                      and required.issubset(labels)
                  ):
                      set_output(target, f"{target}_idle")
                      sys.exit(0)

          set_output("github", "no_idle_runner")
          PY

  rust_small_cx43:
    name: Shipper Rust Small on CX43
    needs: [route]
    if: needs.route.outputs.target == 'cx43'
    runs-on: [self-hosted, Linux, X64, em-ci, rust-small, trusted-pr, cx43]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-routed-rust-small-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-routed-rust-small-

      - name: Check workspace
        run: cargo check --workspace --locked --all-targets

      - name: Test workspace
        run: cargo test --workspace --locked --all-targets

      - name: Test docs
        run: cargo test --workspace --locked --doc

      - name: Smoke CLI help
        run: |
          cargo run -p shipper -- --help
          cargo run -p shipper -- plan --help
          cargo run -p shipper -- preflight --help

  rust_small_cx33:
    name: Shipper Rust Small on CX33
    needs: [route]
    if: needs.route.outputs.target == 'cx33'
    runs-on: [self-hosted, Linux, X64, em-ci, rust-small, trusted-pr, cx33]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-routed-rust-small-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-routed-rust-small-

      - name: Check workspace
        run: cargo check --workspace --locked --all-targets

      - name: Test workspace
        run: cargo test --workspace --locked --all-targets

      - name: Test docs
        run: cargo test --workspace --locked --doc

      - name: Smoke CLI help
        run: |
          cargo run -p shipper -- --help
          cargo run -p shipper -- plan --help
          cargo run -p shipper -- preflight --help

  rust_small_cx53:
    name: Shipper Rust Small on CX53
    needs: [route]
    if: needs.route.outputs.target == 'cx53'
    runs-on: [self-hosted, Linux, X64, em-ci, rust-small, trusted-pr, cx53]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-routed-rust-small-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-routed-rust-small-

      - name: Check workspace
        run: cargo check --workspace --locked --all-targets

      - name: Test workspace
        run: cargo test --workspace --locked --all-targets

      - name: Test docs
        run: cargo test --workspace --locked --doc

      - name: Smoke CLI help
        run: |
          cargo run -p shipper -- --help
          cargo run -p shipper -- plan --help
          cargo run -p shipper -- preflight --help

  rust_small_github:
    name: Shipper Rust Small on GitHub Hosted
    needs: [route]
    if: needs.route.outputs.target == 'github'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-routed-rust-small-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-routed-rust-small-

      - name: Check workspace
        run: cargo check --workspace --locked --all-targets

      - name: Test workspace
        run: cargo test --workspace --locked --all-targets

      - name: Test docs
        run: cargo test --workspace --locked --doc

      - name: Smoke CLI help
        run: |
          cargo run -p shipper -- --help
          cargo run -p shipper -- plan --help
          cargo run -p shipper -- preflight --help

  result:
    name: Shipper Rust Small Result
    needs:
      - route
      - rust_small_cx43
      - rust_small_cx33
      - rust_small_cx53
      - rust_small_github
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Normalize routed result
        env:
          TARGET: ${{ needs.route.outputs.target }}
          REASON: ${{ needs.route.outputs.reason }}
          TRUSTED: ${{ needs.route.outputs.trusted }}
          ROUTE_RESULT: ${{ needs.route.result }}
          CX43_RESULT: ${{ needs.rust_small_cx43.result }}
          CX33_RESULT: ${{ needs.rust_small_cx33.result }}
          CX53_RESULT: ${{ needs.rust_small_cx53.result }}
          GITHUB_RESULT: ${{ needs.rust_small_github.result }}
        run: |
          python3 <<'PY'
          import os
          import sys

          target = os.environ.get("TARGET", "")
          reason = os.environ.get("REASON", "")
          route_result = os.environ.get("ROUTE_RESULT", "")
          trusted = os.environ.get("TRUSTED", "")
          results = {
              "cx43": os.environ.get("CX43_RESULT", ""),
              "cx33": os.environ.get("CX33_RESULT", ""),
              "cx53": os.environ.get("CX53_RESULT", ""),
              "github": os.environ.get("GITHUB_RESULT", ""),
          }

          print(f"router_target={target}")
          print(f"router_reason={reason}")
          print(f"trusted={trusted}")
          print(f"route_result={route_result}")
          for name, value in results.items():
              print(f"{name}_result={value}")

          if route_result != "success":
              print("Route job did not succeed.")
              sys.exit(1)

          if target not in results:
              print("Route job did not emit a known target.")
              sys.exit(1)

          failures = []
          for name, value in results.items():
              if name == target:
                  if value != "success":
                      failures.append(f"selected {name} job result was {value}")
              elif value != "skipped":
                  failures.append(f"unselected {name} job result was {value}")

          if failures:
              for failure in failures:
                  print(failure)
              sys.exit(1)

          print("Exactly one routed Rust small lane succeeded.")
          PY
