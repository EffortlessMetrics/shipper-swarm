name: Mutation Testing

# Two lanes, kept deliberately separate:
#
#   mutants-weekly:  the existing scheduled run. Mutates the small set of
#                    crates that already had coverage. Whole-workspace
#                    mutation across trust-critical crates is a separate
#                    rollout step (see docs/ci/test-evidence-lanes.md).
#
#   mutants-pr:      label-gated PR-time lane added in #182 PR 3. Only
#                    runs when a maintainer applies the `mutation` or
#                    `full-ci` label to a PR. Scopes mutation to the
#                    files the PR changed via `cargo xtask mutants-pr
#                    --changed`. Off the default PR hot path.

on:
  schedule:
    # Weekly on Sunday at 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:
  pull_request:
    # `labeled` so applying the label retriggers the workflow. The
    # mutants-pr job's `if:` guard then decides whether to actually run.
    types: [opened, synchronize, reopened, labeled]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pull-requests: read

jobs:
  mutants-weekly:
    name: Mutation Testing (weekly)
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mutants-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-mutants-

      - name: Run mutation testing
        # Note: shipper-plan, shipper-policy, shipper-levels removed during
        # decrating (PRs #54, #56). Their mutation coverage will be reintroduced
        # under the new module paths in shipper/ once absorptions settle.
        # Expanding the crate list to the full trust-critical surface
        # (shipper-core, shipper-encrypt, shipper-output-sanitizer, etc.)
        # is a separate rollout step; that surface is too expensive for a
        # 60-minute job and needs its own scoping work.
        run: |
          cargo mutants --no-shuffle \
            -p shipper-duration \
            -p shipper-types \
            -p shipper-config \
            -- --all-features

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: mutants.out/
          retention-days: 14

  mutants-pr:
    name: Mutation Testing (PR, label-gated)
    # Only runs on PRs that explicitly opt in via a label. Without the
    # guard, every PR would pay the mutation tax — exactly the failure
    # mode docs/ci/test-evidence-lanes.md guards against.
    if: >
      github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'mutation') ||
        contains(github.event.pull_request.labels.*.name, 'full-ci')
      )
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # Full history so `git diff <base>...HEAD` works inside the
          # xtask wrapper.
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mutants-pr-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-mutants-pr-

      - name: cargo xtask mutants-pr --changed
        run: |
          cargo xtask mutants-pr \
            --changed \
            --base "origin/${{ github.event.pull_request.base.ref }}"

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report-pr-${{ github.event.pull_request.number }}
          path: mutants.out/
          if-no-files-found: ignore
          retention-days: 14
