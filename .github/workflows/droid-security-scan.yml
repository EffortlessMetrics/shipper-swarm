name: Droid Security Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: droid-security-scan-${{ github.repository }}
  cancel-in-progress: false

jobs:
  droid-security-scan:
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx53, rust-large, trusted-pr]

    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Configure MiniMax M3 for Factory Droid BYOK
        shell: bash
        run: |
          mkdir -p "$HOME/.factory"
          rm -f "$HOME/.factory/settings.local.json"
          cat > "$HOME/.factory/settings.json" <<'JSON'
          {
            "customModels": [
              {
                "displayName": "MiniMax-M3",
                "model": "MiniMax-M3",
                "baseUrl": "https://api.minimax.io/anthropic",
                "apiKey": "${MINIMAX_API_KEY}",
                "provider": "anthropic",
                "maxOutputTokens": 64000
              }
            ]
          }
          JSON

      - name: Install Bun for Droid action
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.11

      - name: Run Droid scheduled security scan
        uses: EffortlessMetrics/droid-action-safe@7c1377ccbacddc95560d1570547a5baa51de01ec
        env:
          ANTHROPIC_AUTH_TOKEN: ""
          ANTHROPIC_BASE_URL: ""
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          upload_debug_artifacts: false
          path_to_bun_executable: ${{ steps.setup-bun.outputs.bun-path }}
          security_scan_schedule: true
          security_scan_days: 7
          security_model: "custom:MiniMax-M3-0"
          security_severity_threshold: medium
          security_block_on_critical: true
          security_block_on_high: false
          show_full_output: false
