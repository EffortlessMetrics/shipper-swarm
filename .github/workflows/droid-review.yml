name: Droid Auto Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: droid-review-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  droid-review:
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !startsWith(github.event.pull_request.head.ref, 'droid/security-report-')

    runs-on: self-hosted

    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Provide constrained gh shim for Droid PR checkout
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          cat > "$RUNNER_TEMP/bin/gh" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          if [[ "${1:-}" != "pr" || "${2:-}" != "checkout" ]]; then
            echo "This constrained gh shim only supports: gh pr checkout <number>" >&2
            exit 127
          fi

          pr_number="${3:-}"
          if [[ -z "$pr_number" || "$pr_number" == *[!0-9]* ]]; then
            echo "PR number must be numeric" >&2
            exit 2
          fi

          git fetch --no-tags --prune --depth=1 origin \
            "+refs/pull/${pr_number}/head:refs/remotes/droid-pr-${pr_number}"
          git checkout --force "refs/remotes/droid-pr-${pr_number}"
          SH
          chmod +x "$RUNNER_TEMP/bin/gh"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Configure MiniMax BYOK for Factory Droid
        shell: bash
        run: |
          mkdir -p "$HOME/.factory"
          cat > "$HOME/.factory/settings.local.json" <<'JSON'
          {
            "customModels": [
              {
                "displayName": "MiniMax-M2.7",
                "model": "MiniMax-M2.7",
                "baseUrl": "https://api.minimax.io/anthropic",
                "apiKey": "${MINIMAX_API_KEY}",
                "provider": "anthropic",
                "maxOutputTokens": 64000,
                "noImageSupport": true,
                "extraArgs": {
                  "temperature": 1
                }
              }
            ]
          }
          JSON

      - name: Install Bun for Droid action
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.11

      - name: Run Droid Auto Review with MiniMax M2.7 BYOK
        uses: EffortlessMetrics/droid-action-safe@7c1377ccbacddc95560d1570547a5baa51de01ec
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          upload_debug_artifacts: false
          path_to_bun_executable: ${{ steps.setup-bun.outputs.bun-path }}

          allowed_bots: dependabot[bot]

          automatic_review: true
          automatic_security_review: true

          review_depth: shallow
          review_model: "custom:MiniMax-M2.7-0"
          security_model: "custom:MiniMax-M2.7-0"

          security_severity_threshold: high
          security_block_on_critical: true
          security_block_on_high: false

          include_suggestions: true
          show_full_output: false
