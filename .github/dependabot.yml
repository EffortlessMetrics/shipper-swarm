# Dependabot configuration for shipper
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    reviewers:
      - "EffortlessMetrics/shipper-maintainers"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"
      include: "scope"
    # RustCrypto ecosystem (hmac, sha2, pbkdf2, aes-gcm) bumps minor versions
    # together because they share the `digest` trait version. A lone hmac 0.13
    # or sha2 0.11 bump fails to compile because pbkdf2 0.13 and aes-gcm 0.11
    # (the coupled counterparts on digest 0.11) are still pre-release. Re-
    # enable these updates once pbkdf2 0.13 and aes-gcm 0.11 ship as stable.
    ignore:
      - dependency-name: "hmac"
        update-types:
          - "version-update:semver-minor"
      - dependency-name: "sha2"
        update-types:
          - "version-update:semver-minor"
      - dependency-name: "pbkdf2"
        update-types:
          - "version-update:semver-minor"
      - dependency-name: "aes-gcm"
        update-types:
          - "version-update:semver-minor"
    groups:
      # Group minor/patch updates for dev dependencies
      dev-deps:
        patterns:
          - "proptest"
          - "insta"
          - "assert_cmd"
          - "tempfile"
          - "serial_test"
          - "tiny_http"
        update-types:
          - "minor"
          - "patch"
      # Group tokio ecosystem updates
      tokio:
        patterns:
          - "tokio"
          - "tokio-*"
        update-types:
          - "minor"
          - "patch"
      # Group serde ecosystem
      serde:
        patterns:
          - "serde"
          - "serde_*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "EffortlessMetrics/shipper-maintainers"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"